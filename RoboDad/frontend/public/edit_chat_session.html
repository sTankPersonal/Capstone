<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Edit an existing chat session in RoboDad." />
    <title>RoboDad - Edit Chat</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat_sessions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="chats-layout">

        <!-- Left Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h3>Your Chats</h3>
                <a href="/user/chats/new" class="sidebar-new-btn">+ New</a>
            </div>
            <nav class="chat-list" aria-label="Chat sessions">
                {{#chat_sessions}}
                <a class="chat-list-item" href="/user/chats/{{id}}/messages">{{description}}</a>
                {{/chat_sessions}}
                {{^chat_sessions}}
                <p class="sidebar-empty">No chats yet</p>
                {{/chat_sessions}}
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="chats-main">
            <div class="session-form-card">
                <h2>Edit Chat Session</h2>

                <form id="edit-session-form" method="POST" action="">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" name="description"
                               minlength="1" maxlength="255"
                               value="{{chat_session.description}}" required />
                    </div>
                    <div class="form-group">
                        <label for="additional_info">Additional Info <span class="label-optional">(optional)</span></label>
                        <textarea id="additional_info" name="additional_info"
                                  maxlength="2000"
                                  placeholder="Any extra context for the AI...">{{chat_session.additionalInfo}}</textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="/user/chats/{{chat_session.id}}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>

    </div>

    <script src="/js/edit_chat_session.js"></script>

</body>
</html>
