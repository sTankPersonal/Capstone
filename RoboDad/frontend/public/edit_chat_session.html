<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Edit Chat</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat_sessions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="chats-layout">

        <!-- Left Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h3>Your Chats</h3>
                <a href="/user/chats/new" class="sidebar-new-btn">+ New</a>
            </div>
            <nav class="chat-list">
                {{#chat_sessions}}
                <a class="chat-list-item" href="/user/chats/{{id}}/messages">{{description}}</a>
                {{/chat_sessions}}
                {{^chat_sessions}}
                <p class="sidebar-empty">No chats yet</p>
                {{/chat_sessions}}
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="chats-main">
            <div class="session-form-card">
                <h2>Edit Chat Session</h2>

                <div id="alert" class="alert" style="display:none;"></div>

                <form id="edit-session-form">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" name="description"
                               value="{{chat_session.description}}" required />
                    </div>
                    <div class="form-group">
                        <label for="additional_info">Additional Info <span style="font-weight:normal;color:#888;">(optional)</span></label>
                        <textarea id="additional_info" name="additional_info"
                                  placeholder="Any extra context for the AI...">{{chat_session.additionalInfo}}</textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="/user/chats/{{chat_session.id}}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>

    </div>

    <script>
        document.getElementById('edit-session-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var form = e.target;
            var params = new URLSearchParams({ description: form.description.value });
            var info = form.additional_info.value.trim();
            if (info) params.append('additional_info', info);
            fetch(window.location.href, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            }).then(function (res) {
                if (res.ok) {
                    window.location.href = '/user/chats/{{chat_session.id}}';
                } else {
                    return res.text().then(function (msg) { showAlert(msg || 'Failed to update. Please try again.', false); });
                }
            }).catch(function () { showAlert('An error occurred. Please try again.', false); });
        });

        function showAlert(msg, success) {
            var el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert ' + (success ? 'alert-success' : 'alert-error');
            el.style.display = 'block';
        }

        var path = window.location.pathname.replace('/edit', '/messages');
        document.querySelectorAll('.chat-list-item').forEach(function (a) {
            if (a.getAttribute('href') === path) a.classList.add('active');
        });
    </script>

</body>
</html>
