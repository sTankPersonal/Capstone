<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Delete Earning</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.first_name}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="delete-card">
            <h2>Delete Earning?</h2>
            <p>This action cannot be undone.</p>

            <div class="transaction-summary">
                <p><strong>Description:</strong> {{transaction.description}}</p>
                <p><strong>Amount:</strong> ${{transaction.amount}}</p>
                <p><strong>Date:</strong> {{transaction.transactionDate}}</p>
            </div>

            <div id="alert" class="alert" style="display:none;"></div>

            <div class="form-actions" style="justify-content:center;">
                <button id="confirm-btn" class="btn btn-danger">Yes, Delete</button>
                <a href="/user/transactions/{{transaction.id}}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('confirm-btn').addEventListener('click', function () {
            fetch(window.location.href, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: '',
                redirect: 'follow'
            }).then(function (res) {
                if (res.ok) {
                    window.location.href = res.url || '/user/transactions/category/income';
                } else {
                    return res.text().then(function (msg) { showAlert(msg || 'Failed to delete. Please try again.', false); });
                }
            }).catch(function () { showAlert('An error occurred. Please try again.', false); });
        });

        function showAlert(msg, success) {
            var el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert ' + (success ? 'alert-success' : 'alert-error');
            el.style.display = 'block';
        }
    </script>

</body>
</html>
