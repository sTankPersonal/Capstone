<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Login &amp; Security</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="settings-container">
        <div class="settings-section-header">
            <h1>Login &amp; Security</h1>
            <a href="/user/settings/userLogin/edit" class="btn btn-primary">Edit</a>
        </div>

        <div class="detail-card">
            <div class="detail-row">
                <span class="field-label">Email</span>
                <span class="field-value">{{user.email}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Password</span>
                <span class="field-value">••••••••</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Member Since</span>
                <span class="field-value">{{user.createdAt}}</span>
            </div>
        </div>

        <div class="detail-actions">
            <a href="/user/settings" class="btn btn-secondary">Back to Settings</a>
        </div>
    </div>

</body>
</html>
