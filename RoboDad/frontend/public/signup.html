<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad Sign Up</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <style>
        .signup-container {
            max-width: 400px;
            margin: 60px auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .signup-container h2 { margin: 0; }
        .signup-container label {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            font-size: 0.9rem;
        }
        .signup-container input,
        .signup-container select {
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .signup-container button {
            padding: 0.6rem;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h2>Sign Up</h2>
        <form method="POST" action="/api/auth/register">
            <label>
                Name
                <input type="text" name="name" autocomplete="name" minlength="1" maxlength="100" required />
            </label>
            <label>
                Age
                <input type="number" name="age" min="0" max="150" required />
            </label>
            <label>
                Employment Status
                <select name="employment_status" required>
                    <option value="0">Employed</option>
                    <option value="1">Unemployed</option>
                    <option value="2">Student</option>
                    <option value="3">Retired</option>
                </select>
            </label>
            <label>
                Email
                <input type="email" name="email" autocomplete="email" maxlength="254" required />
            </label>
            <label>
                Password
                <input type="password" name="password" autocomplete="new-password" minlength="8" required />
            </label>
            <label>
                Confirm Password
                <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required />
            </label>
            <button type="submit">Create Account</button>
        </form>
        <p>Already have an account? <a href="/login">Log in</a></p>
    </div>
</body>
</html>
