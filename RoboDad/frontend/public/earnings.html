<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track and manage your income and earnings in RoboDad." />
    <title>RoboDad - Earnings</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-list-page">
        <div class="transactions-header">
            <h1>Earnings</h1>
            <div class="transactions-header-actions">
                <button type="button" id="import-csv-btn" class="btn btn-secondary" data-category="{{category_id}}" data-noun="earning">Import CSV</button>
                <a href="/user/transactions/category/{{category_id}}/new" class="btn btn-primary">+ Add Earning</a>
            </div>
        </div>

        <input type="file" id="import-csv-input" accept=".csv,.tsv,.txt,text/csv,text/plain" hidden />
        <div id="import-csv-status" class="import-csv-status" role="status" hidden></div>

        <div class="txn-layout">

            <aside class="txn-rail">
                <div class="summary-card">
                    <div class="label">Total Earnings</div>
                    <div class="value value--income" id="total-value">$0.00</div>
                </div>
                <div class="summary-card">
                    <div class="label">Entries</div>
                    <div class="value" id="count-value">0</div>
                </div>

                <div class="txn-filter">
                    <div class="txn-filter-title">Search</div>
                    <input type="text" id="txn-search-input" class="txn-search-input" placeholder="Search...">
                </div>
            </aside>

            <div class="txn-main">
                <div class="txn-selection-bar">
                    <label class="txn-selectall">
                        <input type="checkbox" id="txn-select-all" autocomplete="off" />
                        <span>Select all</span>
                    </label>
                    <button type="button" id="txn-delete-selected" class="txn-delete-btn" disabled
                            aria-label="Delete selected" data-category="{{category_id}}" data-noun="earning">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                        <span id="txn-delete-count"></span>
                    </button>
                </div>
                <table class="txn-table">
                    <thead>
                        <tr>
                            <th scope="col" class="th-select"></th>
                            <th scope="col">Transaction</th>
                            <th scope="col" class="th-amount">Amount</th>
                            <th scope="col" class="th-actions"></th>
                        </tr>
                    </thead>
                    <tbody>
                        {{#transactions}}
                        <tr class="txn-row" data-category="{{categoryId}}" data-description="{{description}}">
                            <td class="txn-cell-select">
                                <input type="checkbox" class="txn-row-check" value="{{id}}" aria-label="Select transaction" autocomplete="off" />
                            </td>
                            <td class="txn-cell-main">
                                <div class="txn-desc">{{description}} <span class="txn-badge"></span></div>
                                <div class="txn-date">{{transactionDate}}</div>
                            </td>
                            <td class="txn-cell-amount" data-amount="{{amount}}">${{amount}}</td>
                            <td class="txn-cell-actions">
                                <div class="txn-menu">
                                    <button class="txn-menu-btn" aria-label="Actions" aria-haspopup="true">&#8943;</button>
                                    <div class="txn-menu-list">
                                        <a href="/user/transactions/{{id}}">View</a>
                                        <a href="/user/transactions/{{id}}/edit">Edit</a>
                                        <a href="/user/transactions/{{id}}/delete" class="danger">Delete</a>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        {{/transactions}}
                    </tbody>
                </table>
                <div class="txn-empty" id="txn-empty" style="display:none;">No earnings match your search.</div>
            </div>

        </div>
    </div>

    <script src="/js/transactions_view.js"></script>
    <script src="/js/import_csv.js"></script>
    <script src="/js/bulk_delete.js"></script>

</body>
</html>
