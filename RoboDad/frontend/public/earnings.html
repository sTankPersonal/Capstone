<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Earnings</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="transactions-header">
            <h1>Earnings</h1>
            <a href="/user/transactions/category/{{category_id}}/new" class="btn btn-primary">+ Add Earning</a>
        </div>

        <div class="summary-cards">
            <div class="summary-card">
                <div class="label">Total Earnings</div>
                <div class="value" id="total-value">$0.00</div>
            </div>
            <div class="summary-card">
                <div class="label">Entries</div>
                <div class="value" id="count-value">0</div>
            </div>
        </div>

        <table class="transaction-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {{#transactions}}
                <tr>
                    <td data-label="Date">{{transactionDate}}</td>
                    <td data-label="Description">{{description}}</td>
                    <td data-label="Amount" class="amount-cell">${{amount}}</td>
                    <td data-label="Actions">
                        <div class="actions-cell">
                            <a href="/user/transactions/{{id}}" class="btn btn-secondary">View</a>
                            <a href="/user/transactions/{{id}}/edit" class="btn btn-primary">Edit</a>
                            <a href="/user/transactions/{{id}}/delete" class="btn btn-danger">Delete</a>
                        </div>
                    </td>
                </tr>
                {{/transactions}}
            </tbody>
        </table>
    </div>

    <script>
        (function () {
            var total = 0, count = 0;
            document.querySelectorAll('.amount-cell').forEach(function (cell) {
                var val = parseFloat(cell.textContent.replace('$', ''));
                if (!isNaN(val)) { total += val; count++; }
            });
            document.getElementById('total-value').textContent = '$' + total.toFixed(2);
            document.getElementById('count-value').textContent = count;
        })();
    </script>

</body>
</html>
