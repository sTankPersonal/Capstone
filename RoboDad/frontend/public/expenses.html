<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track and manage your expenses and spending in RoboDad." />
    <title>RoboDad - Expenses</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="transactions-header">
            <h1>Expenses</h1>
            <a href="/user/transactions/category/{{category_id}}/new" class="btn btn-primary">+ Add Expense</a>
        </div>

        <div class="summary-cards">
            <div class="summary-card">
                <div class="label">Total Expenses</div>
                <div class="value" id="total-value">$0.00</div>
            </div>
            <div class="summary-card">
                <div class="label">Entries</div>
                <div class="value" id="count-value">0</div>
            </div>
        </div>

        <table class="transaction-table">
            <thead>
                <tr>
                    <th scope="col">Date</th>
                    <th scope="col">Description</th>
                    <th scope="col">Amount</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                {{#transactions}}
                <tr>
                    <td data-label="Date">{{transactionDate}}</td>
                    <td data-label="Description">{{description}}</td>
                    <td data-label="Amount" class="amount-cell">${{amount}}</td>
                    <td data-label="Actions">
                        <div class="actions-cell">
                            <a href="/user/transactions/{{id}}" class="btn btn-secondary">View</a>
                            <a href="/user/transactions/{{id}}/edit" class="btn btn-primary">Edit</a>
                            <a href="/user/transactions/{{id}}/delete" class="btn btn-danger">Delete</a>
                        </div>
                    </td>
                </tr>
                {{/transactions}}
            </tbody>
        </table>
    </div>

    <script src="/js/amount_totals.js"></script>

</body>
</html>
