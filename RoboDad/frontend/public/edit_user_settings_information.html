<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Edit Personal Information</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="settings-container">
        <div class="transaction-form-card">
            <h2>Edit Personal Information</h2>

            <form method="POST" action="">
                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" value="{{user.firstName}}" />
                </div>
                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" value="{{user.lastName}}" />
                </div>
                <div class="form-group">
                    <label for="date_of_birth">Date of Birth</label>
                    <input type="date" id="date_of_birth" name="date_of_birth" value="{{user.dateOfBirth}}" />
                </div>
                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" name="country">
                        <option value="">-- Select Country --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="currency">Currency</label>
                    <select id="currency" name="currency">
                        <option value="">-- Select Currency --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="language">Language</label>
                    <select id="language" name="language">
                        <option value="">-- Select Language --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="employment_status">Employment Status</label>
                    <select id="employment_status" name="employment_status">
                        <option value="">-- Select Status --</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/user/settings/userInformation" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/dropdowns.js"></script>
    <script>
        (async function () {
            await populateDropdown('country',           '/references/countries',           'countries',          '{{user.countryId}}');
            await populateDropdown('currency',          '/references/currencies',          'currencies',         '{{user.currencyId}}');
            await populateDropdown('language',          '/references/languages',           'languages',          '{{user.languageId}}');
            await populateDropdown('employment_status', '/references/employment-statuses', 'employmentStatuses', '{{user.employmentStatusId}}');
        })();
    </script>

</body>
</html>
