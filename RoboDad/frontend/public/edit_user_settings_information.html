<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Update your personal information and regional preferences in RoboDad." />
    <title>RoboDad - Edit Personal Information</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="settings-container">
        <div class="transaction-form-card">
            <h2>Edit Personal Information</h2>

            <div id="form-error" class="alert alert-error" role="alert" style="display:none;"></div>

            <form method="POST" action="" id="information-form">
                <div class="form-group">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name"
                           minlength="1" maxlength="100" autocomplete="given-name"
                           value="{{user.firstName}}" required />
                </div>
                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name"
                           minlength="1" maxlength="100" autocomplete="family-name"
                           value="{{user.lastName}}" required />
                </div>
                <div class="form-group">
                    <label for="date_of_birth">Date of Birth</label>
                    <input type="date" id="date_of_birth" name="date_of_birth"
                           min="1900-01-01" autocomplete="bday"
                           value="{{user.dateOfBirth}}" />
                    <small class="hint-text">You must be at least 18 years old.</small>
                </div>
                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" name="country">
                        <option value="">-- Select Country --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="currency">Currency</label>
                    <select id="currency" name="currency">
                        <option value="">-- Select Currency --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="language">Language</label>
                    <select id="language" name="language">
                        <option value="">-- Select Language --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="employment_status">Employment Status</label>
                    <select id="employment_status" name="employment_status">
                        <option value="">-- Select Status --</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/user/settings/userInformation" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/dropdowns.js"></script>
    <script>
        (async function () {
            await populateDropdown('country',           '/references/countries',           'countries',          '{{user.countryId}}');
            await populateDropdown('currency',          '/references/currencies',          'currencies',         '{{user.currencyId}}');
            await populateDropdown('language',          '/references/languages',           'languages',          '{{user.languageId}}');
            await populateDropdown('employment_status', '/references/employment-statuses', 'employmentStatuses', '{{user.employmentStatusId}}');
        })();
    </script>
    <script>
        (function () {
            // Date of birth must be at least 18 years in the past. All dates remain
            // selectable; we surface a red error message when the entry is under 18.
            function pad(n) { return String(n).padStart(2, '0'); }

            var dobInput = document.getElementById('date_of_birth');
            var now = new Date();
            var latest = new Date(now.getFullYear() - 18, now.getMonth(), now.getDate());
            var maxDob = latest.getFullYear() + '-' + pad(latest.getMonth() + 1) + '-' + pad(latest.getDate());

            var form = document.getElementById('information-form');
            var errorBox = document.getElementById('form-error');

            function isUnderage() {
                return dobInput.value && dobInput.value > maxDob;
            }

            function showError() {
                errorBox.textContent = 'You must be 18 or over to use RoboDad.';
                errorBox.style.display = 'block';
            }

            dobInput.addEventListener('input', function () {
                if (isUnderage()) {
                    showError();
                } else {
                    errorBox.style.display = 'none';
                }
            });

            form.addEventListener('submit', function (e) {
                if (isUnderage()) {
                    e.preventDefault();
                    showError();
                }
            });
        })();
    </script>

</body>
</html>
