<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View details for a specific transaction in RoboDad." />
    <title>RoboDad - Transaction Details</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="detail-card">
            <h2>Transaction Details</h2>

            <div class="detail-row">
                <span class="field-label">Date</span>
                <span class="field-value">{{transaction.transactionDate}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Description</span>
                <span class="field-value">{{transaction.description}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Amount</span>
                <span class="field-value">${{transaction.amount}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Created</span>
                <span class="field-value">{{transaction.createdAt}}</span>
            </div>

            <div class="detail-actions">
                <a href="/user/transactions/{{transaction.id}}/edit" class="btn btn-primary">Edit</a>
                <a href="/user/transactions/{{transaction.id}}/delete" class="btn btn-danger">Delete</a>
                <a href="/user/transactions/category/{{transaction.categoryId}}" class="btn btn-secondary">Back</a>
            </div>
        </div>
    </div>

</body>
</html>
