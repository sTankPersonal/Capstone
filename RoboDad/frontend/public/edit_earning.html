<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Edit an existing earning entry in RoboDad." />
    <title>RoboDad - Edit Earning</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="transaction-form-card">
            <h2>Edit Earning</h2>

            <form method="POST" action="">
                <input type="hidden" name="category_id" value="{{transaction.categoryId}}" />

                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0.01" max="9999999.99"
                           value="{{transaction.amount}}" autocomplete="off" required />
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" maxlength="255"
                           value="{{transaction.description}}" autocomplete="off" required />
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           value="{{transaction.transactionDate}}" required />
                </div>

                <div class="form-group">
                    <label for="pfc_primary">Category (Primary)</label>
                    <select id="pfc_primary">
                        <option value="">-- Select primary category --</option>
                        {{#pfcPrimaryCategories}}
                        <option value="{{id}}">{{value}}</option>
                        {{/pfcPrimaryCategories}}
                    </select>
                </div>
                <div class="form-group">
                    <label for="pfc_detailed_category_id">Category (Detailed)</label>
                    <select id="pfc_detailed_category_id" name="pfc_detailed_category_id">
                        <option value="">-- Select detailed category --</option>
                        {{#pfcDetailedCategories}}
                        <option value="{{id}}" data-primary="{{primaryCategoryId}}">{{value}}</option>
                        {{/pfcDetailedCategories}}
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Earning</button>
                    <a href="/user/transactions/{{transaction.id}}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>window.__pfcCurrentDetailed = "{{transaction.pfcDetailedCategoryId}}";</script>
    <script src="/js/pfc_cascade.js"></script>

</body>
</html>
