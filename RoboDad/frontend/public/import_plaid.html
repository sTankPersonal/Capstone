<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Import bank transactions into RoboDad using your Plaid access token." />
    <title>RoboDad - Import from Plaid</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="transaction-form-card">
            <h2>Import from Plaid</h2>
            <p class="hint-text">
                Sync transactions directly from your bank using your Plaid access token.
            </p>

            <form method="POST" action="">
                <div class="form-group">
                    <label for="access_token">Plaid Access Token</label>
                    <input type="text" id="access_token" name="access_token"
                           minlength="20" maxlength="255" placeholder="access-sandbox-..."
                           autocomplete="off" required />
                </div>
                <div class="form-group">
                    <label for="start_date">Start Date</label>
                    <input type="date" id="start_date" name="start_date" required />
                </div>
                <div class="form-group">
                    <label for="end_date">End Date</label>
                    <input type="date" id="end_date" name="end_date" required />
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Import Transactions</button>
                    <a href="/user/transactions" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/import_plaid.js"></script>

</body>
</html>
