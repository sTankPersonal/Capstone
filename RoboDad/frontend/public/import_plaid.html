<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Connect your bank account to RoboDad using Plaid." />
    <title>RoboDad - Connect Bank</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="transaction-form-card">
            <h2>Connect Your Bank</h2>
            <p class="hint-text">
                Click <strong>Connect Bank</strong> to securely link your account through
                Plaid and import all available transactions.
            </p>

            <!--
                This form is submitted by the Plaid Link onSuccess callback.
                JS fills in public_token before submitting.
            -->
            <form id="plaid-form" method="POST" action="/user/plaid/exchange">
                <input type="hidden" id="public_token" name="public_token" />

                <div class="form-actions">
                    <button type="button" id="connect-btn" class="btn btn-primary">Connect Bank</button>
                    <a href="/user/transactions" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <script src="/js/import_plaid.js"></script>

</body>
</html>
