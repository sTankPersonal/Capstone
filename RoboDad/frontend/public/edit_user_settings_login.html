<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Change your password and update login security settings in RoboDad." />
    <title>RoboDad - Change Password</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="settings-container">
        <div class="transaction-form-card">
            <h2>Change Password</h2>

            <div class="form-group">
                <label for="email_display">Email Address</label>
                <input type="text" id="email_display" value="{{user.email}}" disabled class="input-disabled" />
            </div>

            <form method="POST" action="" id="change-password-form">
                <div class="form-group">
                    <label for="current_password">Current Password</label>
                    <input type="password" id="current_password" name="current_password"
                           minlength="8" maxlength="128" autocomplete="current-password" required />
                </div>
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password"
                           minlength="8" maxlength="128" autocomplete="new-password" required />
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                           minlength="8" maxlength="128" autocomplete="new-password" required />
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Password</button>
                    <a href="/user/settings/userLogin" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>


</body>
</html>
