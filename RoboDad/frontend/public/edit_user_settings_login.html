<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Change Password</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="settings-container">
        <div class="transaction-form-card">
            <h2>Change Password</h2>

            <div class="form-group">
                <label>Email Address</label>
                <input type="text" value="{{user.email}}" disabled style="background:#f5f5f5; color:#888; cursor:not-allowed;" />
            </div>

            <form method="POST" action="" id="change-password-form">
                <div class="form-group">
                    <label for="current_password">Current Password</label>
                    <input type="password" id="current_password" name="current_password" required />
                </div>
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" minlength="8" required />
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" minlength="8" required />
                </div>

                <div id="form-error" class="alert alert-error" style="display:none;"></div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Password</button>
                    <a href="/user/settings/userLogin" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('change-password-form').addEventListener('submit', function (e) {
            var np = document.getElementById('new_password').value;
            var cp = document.getElementById('confirm_password').value;
            var err = document.getElementById('form-error');
            if (np !== cp) {
                e.preventDefault();
                err.textContent = 'New passwords do not match.';
                err.style.display = 'block';
            } else {
                err.style.display = 'none';
            }
        });
    </script>

</body>
</html>
