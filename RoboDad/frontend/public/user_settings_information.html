<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View your personal information and profile details in RoboDad." />
    <title>RoboDad - Personal Information</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
    <link rel="stylesheet" href="/css/settings.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="settings-container">
        <div class="settings-section-header">
            <h1>Personal Information</h1>
            <a href="/user/settings/userInformation/edit" class="btn btn-primary">Edit</a>
        </div>

        <div class="detail-card">
            <div class="detail-row">
                <span class="field-label">First Name</span>
                <span class="field-value">{{user.firstName}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Last Name</span>
                <span class="field-value">{{user.lastName}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Date of Birth</span>
                <span class="field-value">{{user.dateOfBirth}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Country</span>
                <span class="field-value">{{user.countryId}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Currency</span>
                <span class="field-value">{{user.currencyId}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Language</span>
                <span class="field-value">{{user.languageId}}</span>
            </div>
            <div class="detail-row">
                <span class="field-label">Employment Status</span>
                <span class="field-value">{{user.employmentStatusId}}</span>
            </div>
        </div>

        <div class="detail-actions">
            <a href="/user/settings" class="btn btn-secondary">Back to Settings</a>
        </div>
    </div>

</body>
</html>
