<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Complete Profile</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <style>
        .profile-container {
            max-width: 400px;
            margin: 60px auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .profile-container h2 { margin: 0; }
        .profile-container p { margin: 0; color: #555; font-size: 0.9rem; }
        .profile-container label {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            font-size: 0.9rem;
        }
        .profile-container input,
        .profile-container select {
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .profile-container button {
            padding: 0.6rem;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
    <script>
        // Pre-fill name and email from query params passed by Google callback
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const name  = params.get("name");
            const email = params.get("email");
            if (name)  document.getElementById("name-input").value  = name;
            if (email) document.getElementById("email-input").value = email;
        });
    </script>
</head>
<body>
    <div class="profile-container">
        <h2>Almost there!</h2>
        <p>We just need a couple more details to set up your RoboDad account.</p>
        <form method="POST" action="/api/auth/google/complete">
            <label>
                Name
                <input id="name-input" type="text" name="name" required />
            </label>
            <input id="email-input" type="hidden" name="email" />
            <label>
                Age
                <input type="number" name="age" min="0" max="150" required />
            </label>
            <label>
                Employment Status
                <select name="employment_status" required>
                    <option value="0">Employed</option>
                    <option value="1">Unemployed</option>
                    <option value="2">Student</option>
                    <option value="3">Retired</option>
                </select>
            </label>
            <button type="submit">Finish Setup</button>
        </form>
    </div>
</body>
</html>
