<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Edit Expense</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.first_name}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="transaction-form-card">
            <h2>Edit Expense</h2>

            <form method="POST" action="">
                <input type="hidden" name="category_id" value="{{transaction.categoryId}}" />

                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0"
                           value="{{transaction.amount}}" required />
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           value="{{transaction.description}}" required />
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           value="{{transaction.transactionDate}}" required />
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Expense</button>
                    <a href="/user/transactions/{{transaction.id}}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
