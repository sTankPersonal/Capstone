<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chat with your AI financial advisor in RoboDad." />
    <title>RoboDad - Chat</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat_sessions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="chats-layout">

        <!-- Left Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h3>Your Chats</h3>
                <a href="/user/chats/new" class="sidebar-new-btn">+ New</a>
            </div>
            <nav class="chat-list" aria-label="Chat sessions">
                {{#chat_sessions}}
                <a class="chat-list-item" href="/user/chats/{{id}}/messages">{{description}}</a>
                {{/chat_sessions}}
                {{^chat_sessions}}
                <p class="sidebar-empty">No chats yet</p>
                {{/chat_sessions}}
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="chats-main"
              data-user-id="{{user.id}}"
              data-session-id="{{chat_session_id}}"
              aria-label="Chat window">

            <div class="chat-window">
                <div class="chat-window-header">
                    <h2>Chat</h2>
                    <a href="/user/chats/{{chat_session_id}}" class="btn btn-secondary" style="font-size:0.85rem;padding:0.35rem 0.8rem;">Details</a>
                </div>

                <div id="chat">
                    {{#messages}}
                    <div class="msg" data-sender="{{messageSenderId}}">{{content}}</div>
                    {{/messages}}
                </div>

                <div id="inputBar">
                    <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" autofocus />
                    <button id="sendBtn">Send</button>
                </div>
            </div>

        </main>

    </div>

    <script src="/js/chat.js"></script>

</body>
</html>
