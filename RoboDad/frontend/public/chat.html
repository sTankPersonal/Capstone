<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - Chat</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat_sessions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="chats-layout">

        <!-- Left Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h3>Your Chats</h3>
                <a href="/user/chats/new" class="sidebar-new-btn">+ New</a>
            </div>
            <nav class="chat-list">
                {{#chat_sessions}}
                <a class="chat-list-item" href="/user/chats/{{id}}/messages">{{description}}</a>
                {{/chat_sessions}}
                {{^chat_sessions}}
                <p class="sidebar-empty">No chats yet</p>
                {{/chat_sessions}}
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="chats-main"
              data-userid="{{user.id}}"
              data-sessionid="{{chat_session_id}}">

            <div class="chat-window">
                <div class="chat-window-header">
                    <h2>Chat</h2>
                    <a href="/user/chats/{{chat_session_id}}" class="btn btn-secondary" style="font-size:0.85rem;padding:0.35rem 0.8rem;">Details</a>
                </div>

                <div id="chat">
                    {{#messages}}
                    <div class="msg" data-sender="{{messageSenderId}}">{{content}}</div>
                    {{/messages}}
                </div>

                <div id="inputBar">
                    <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" />
                    <button id="sendBtn">Send</button>
                </div>
            </div>

        </main>

    </div>

    <script>
        var main = document.querySelector('.chats-main');
        var userId = main.dataset.userid;
        var sessionId = main.dataset.sessionid;
        var chat = document.getElementById('chat');
        var input = document.getElementById('messageInput');

        // Classify server-rendered messages
        document.querySelectorAll('#chat .msg').forEach(function (msg) {
            msg.classList.add(msg.dataset.sender === 'user' ? 'user' : 'assistant');
        });



        // Scroll to bottom on load
        chat.scrollTop = chat.scrollHeight;

        function addMessage(text, role) {
            var div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            var text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            var params = new URLSearchParams({ message: text });
            fetch('/user/chats/' + sessionId + '/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            }).then(function (res) {
                if (res.status === 401) { window.location.href = '/login'; return null; }
                if (!res.ok) { addMessage('Error sending message. Please try again.', 'assistant'); return null; }
                return res.json();
            }).then(function (data) {
                if (data) addMessage(data.reply, 'assistant');
            }).catch(function () {
                addMessage('Error sending message. Please try again.', 'assistant');
            });
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Highlight active sidebar item
        var activePath = '/user/chats/' + sessionId + '/messages';
        document.querySelectorAll('.chat-list-item').forEach(function (a) {
            if (a.getAttribute('href') === activePath) a.classList.add('active');
        });
    </script>

</body>
</html>
