<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - New Chat</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat_sessions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="chats-layout">

        <!-- Left Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h3>Your Chats</h3>
                <a href="/user/chats/new" class="sidebar-new-btn active">+ New</a>
            </div>
            <nav class="chat-list">
                {{#chat_sessions}}
                <a class="chat-list-item" href="/user/chats/{{id}}/messages">{{description}}</a>
                {{/chat_sessions}}
                {{^chat_sessions}}
                <p class="sidebar-empty">No chats yet</p>
                {{/chat_sessions}}
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="chats-main">
            <div class="session-form-card">
                <h2>New Chat Session</h2>

                <form id="new-session-form" method="POST" action="">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" name="description"
                               placeholder="e.g. Monthly budget review" required />
                    </div>
                    <div class="form-group">
                        <label for="persona_id">Persona</label>
                        <select id="persona_id" name="persona_id" required>
                            <option value="">Loading...</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Create Chat</button>
                        <a href="/user/chats" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>

    </div>

    <script src="/js/dropdowns.js"></script>
    <script>
        populateDropdown('persona_id', '/references/llm-personas', 'llmPersonas', '{{chat_sessions.personaId}}', 'name');

        var path = window.location.pathname;
        document.querySelectorAll('.chat-list-item').forEach(function (a) {
            if (a.getAttribute('href') === path) a.classList.add('active');
        });
    </script>

</body>
</html>
