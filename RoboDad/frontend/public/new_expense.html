<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Add a new expense entry in RoboDad." />
    <title>RoboDad - New Expense</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.firstName}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="transaction-form-card">
            <h2>New Expense</h2>

            <form method="POST" action="">
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0.01" max="9999999.99"
                           placeholder="0.00" autocomplete="off" required />
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" maxlength="255"
                           placeholder="e.g. Groceries, Rent" autocomplete="off" required />
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required />
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Expense</button>
                    <a href="/user/transactions/category/{{category_id}}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/date_default.js"></script>

</body>
</html>
