<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>RoboDad - New Expense</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/transactions.css">
</head>

<body>

    <div id="navbar" data-username="{{user.first_name}}"></div>
    <script src="/components/navbar/navbar.js"></script>

    <div class="transactions-container">
        <div class="transaction-form-card">
            <h2>New Expense</h2>

            <div id="alert" class="alert" style="display:none;"></div>

            <form id="transaction-form">
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="0.00" required />
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" placeholder="e.g. Groceries, Rent" required />
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required />
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Expense</button>
                    <a href="/user/transactions/category/{{category_id}}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('date').valueAsDate = new Date();

        document.getElementById('transaction-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var form = e.target;
            var params = new URLSearchParams({
                amount: form.amount.value,
                description: form.description.value,
                date: form.date.value
            });
            fetch(window.location.href, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString(),
                redirect: 'follow'
            }).then(function (res) {
                if (res.ok) {
                    window.location.href = res.url || '/user/transactions/category/{{category_id}}';
                } else {
                    return res.text().then(function (msg) { showAlert(msg || 'Failed to save. Please try again.', false); });
                }
            }).catch(function () { showAlert('An error occurred. Please try again.', false); });
        });

        function showAlert(msg, success) {
            var el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert ' + (success ? 'alert-success' : 'alert-error');
            el.style.display = 'block';
        }
    </script>

</body>
</html>
