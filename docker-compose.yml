services:

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18080:18080"
    env_file:
      - secrets.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: robodad
      DB_USER: robodad
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


  postgres:
    build:
      context: ./RoboDad/docker/db
      dockerfile: Dockerfile
    env_file:
      - secrets.env
    environment:
      POSTGRES_DB: robodad
      POSTGRES_USER: robodad
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robodad -d robodad"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
